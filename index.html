<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 출석 체크</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 40px auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .subtext {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 15px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .status-btn,
    .submit-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .status-btn:hover,
    .submit-btn:hover {
      transform: translateY(-1px);
    }

    .status-btn.active {
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    .present {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.18);
    }

    .present.active {
      background: var(--success);
      color: white;
    }

    .absent {
      background: rgba(220, 38, 38, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.18);
    }

    .absent.active {
      background: var(--danger);
      color: white;
    }

    .late {
      background: rgba(217, 119, 6, 0.1);
      color: var(--warning);
      border: 1px solid rgba(217, 119, 6, 0.18);
    }

    .late.active {
      background: var(--warning);
      color: white;
    }

    .submit-btn {
      width: 100%;
      margin-top: 18px;
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .submit-btn:hover {
      background: var(--primary-hover);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      min-height: 22px;
      font-size: 14px;
      font-weight: 600;
    }

    .message.success {
      color: var(--success);
    }

    .message.error {
      color: var(--danger);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #fff;
    }

    .record-main {
      min-width: 0;
    }

    .record-name {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px;
      word-break: break-word;
    }

    .record-time {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .status-pill {
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .pill-present {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
    }

    .pill-absent {
      background: rgba(220, 38, 38, 0.1);
      color: var(--danger);
    }

    .pill-late {
      background: rgba(217, 119, 6, 0.1);
      color: var(--warning);
    }

    .empty-state {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fafafa;
    }

    .footer-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .container {
        width: min(100% - 20px, 1100px);
        margin: 20px auto 32px;
      }

      .card {
        padding: 20px;
      }
    }

    @media (max-width: 520px) {
      .status-buttons {
        grid-template-columns: 1fr;
      }

      .record-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="eyebrow">ATTENDANCE SYSTEM</div>
      <h1>학생 출석 체크 웹앱</h1>
      <p>학생 출석 상태를 빠르게 기록하고, Firestore 기반으로 실시간 출석 현황을 확인하세요.</p >
    </header>

    <main class="grid">
      <section class="card">
        <h2>출석 등록</h2>
        <div class="subtext">학생 이름을 입력하고 출석 상태를 선택한 뒤 저장하세요.</div>

        <div class="field">
          <label for="studentName">학생 이름
