<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 출석 체크</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 40px auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .subtext {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 15px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .status-btn,
    .submit-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .status-btn:hover,
    .submit-btn:hover {
      transform: translateY(-1px);
    }

    .status-btn.active {
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    .present {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.18);
    }

    .present.active {
      background: var(--success);
      color: white;
    }

    .absent {
      background: rgba(220, 38, 38, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.18);
    }

    .absent.active {
      background: var(--danger);
      color: white;
    }

    .late {
      background: rgba(217, 119, 6, 0.1);
      color: var(--warning);
      border: 1px solid rgba(217, 119, 6, 0.18);
    }

    .late.active {
      background: var(--warning);
      color: white;
    }

    .submit-btn {
      width: 100%;
      margin-top: 18px;
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .submit-btn:hover {
      background: var(--primary-hover);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      min-height: 22px;
      font-size: 14px;
      font-weight: 600;
    }

    .message.success {
      color: var(--success);
    }

    .message.error {
      color: var(--danger);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #fff;
    }

    .record-main {
      min-width: 0;
    }

    .record-name {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px;
      word-break: break-word;
    }

    .record-time {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .status-pill {
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .pill-present {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
    }

    .pill-absent {
      background: rgba(220, 38, 38, 0.1);
      color: var(--danger);
    }

    .pill-late {
      background: rgba(217, 119, 6, 0.1);
      color: var(--warning);
    }

    .empty-state {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fafafa;
    }

    .footer-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 6px;
      color: #3730a3;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .container {
        width: min(100% - 20px, 1100px);
        margin: 20px auto 32px;
      }

      .card {
        padding: 20px;
      }
    }

    @media (max-width: 520px) {
      .status-buttons {
        grid-template-columns: 1fr;
      }

      .record-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="eyebrow">Attendance System</div>
      <h1>학생 출석 체크 웹앱</h1>
      <p>학생 출석 상태를 빠르게 기록하고, Firestore 기반으로 실시간 출석 현황을 확인하세요.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>출석 등록</h2>
        <div class="subtext">학생 이름을 입력하고 출석 상태를 선택한 뒤 저장하세요.</div>

        <div class="field">
          <label for="studentName">학생 이름</label>
          <input id="studentName" type="text" placeholder="예: 김민준" maxlength="50" />
        </div>

        <div class="field">
          <label>출석 상태</label>
          <div class="status-buttons">
            <button class="status-btn present" data-status="출석">출석</button>
            <button class="status-btn absent" data-status="결석">결석</button>
            <button class="status-btn late" data-status="지각">지각</button>
          </div>
        </div>

        <button id="saveBtn" class="submit-btn">출석 정보 저장</button>
        <div id="message" class="message"></div>

        <div class="footer-note">
          Firebase 설정이 이미 적용되어 있습니다.<br />
          Firestore Database와 보안 규칙만 확인하면 바로 테스트할 수 있습니다.
        </div>
      </section>

      <section class="card">
        <div class="toolbar">
          <div>
            <h2 style="margin:0 0 6px;">실시간 출석 기록</h2>
            <div class="subtext" style="margin:0;">Firestore 변경 사항이 자동으로 반영됩니다.</div>
          </div>
          <div class="badge"><span id="recordCount">0</span> Records</div>
        </div>

        <div id="recordList" class="record-list">
          <div class="empty-state">아직 등록된 출석 기록이 없습니다.</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      query,
      orderBy,
      onSnapshot,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCm9WsdUC96_XWXrnQOVO1AL6m1tfJQljU",
      authDomain: "attendance-app-2026-b9cbb.firebaseapp.com",
      projectId: "attendance-app-2026-b9cbb",
      storageBucket: "attendance-app-2026-b9cbb.firebasestorage.app",
      messagingSenderId: "1004519207751",
      appId: "1:1004519207751:web:b3c7316d4e3d997c639262",
      measurementId: "G-N1E9T668E4",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const studentNameInput = document.getElementById("studentName");
    const saveBtn = document.getElementById("saveBtn");
    const messageEl = document.getElementById("message");
    const recordListEl = document.getElementById("recordList");
    const recordCountEl = document.getElementById("recordCount");
    const statusButtons = document.querySelectorAll(".status-btn");

    let selectedStatus = "출석";

    function setActiveStatus(status) {
      selectedStatus = status;
      statusButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.status === status);
      });
    }

    function showMessage(text, type = "success") {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    function formatDate(record) {
      const dateOptions = {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      };

      if (record?.createdAt?.toDate) {
        return new Intl.DateTimeFormat("ko-KR", dateOptions).format(record.createdAt.toDate());
      }

      if (record?.localCreatedAt) {
        return new Intl.DateTimeFormat("ko-KR", dateOptions).format(new Date(record.localCreatedAt));
      }

      return "시간 없음";
    }).format(timestamp.toDate());
    }

    function getStatusClass(status) {
      if (status === "출석") return "pill-present";
      if (status === "결석") return "pill-absent";
      return "pill-late";
    }

    function renderRecords(records) {
      recordCountEl.textContent = records.length;

      if (!records.length) {
        recordListEl.innerHTML = `<div class="empty-state">아직 등록된 출석 기록이 없습니다.</div>`;
        return;
      }

      recordListEl.innerHTML = records
        .map(
          (record) => `
            <article class="record-item">
              <div class="record-main">
                <p class="record-name">${escapeHtml(record.name)}</p>
                <p class="record-time">등록 시간: ${formatDate(record)}</p>
              </div>
              <div class="status-pill ${getStatusClass(record.status)}">${record.status}</div>
            </article>
          `
        )
        .join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    statusButtons.forEach((btn) => {
      btn.addEventListener("click", () => setActiveStatus(btn.dataset.status));
    });

    setActiveStatus("출석");

    saveBtn.addEventListener("click", async () => {
      const name = studentNameInput.value.trim();

      if (!name) {
        showMessage("학생 이름을 입력해주세요.", "error");
        studentNameInput.focus();
        return;
      }

      try {
        saveBtn.disabled = true;
        showMessage("저장 중입니다...", "success");

        await addDoc(collection(db, "attendance"), {
          name,
          status: selectedStatus,
          createdAt: serverTimestamp(),
          localCreatedAt: new Date().toISOString(),
        });

        studentNameInput.value = "";
        setActiveStatus("출석");
        showMessage("출석 정보가 성공적으로 저장되었습니다.", "success");
      } catch (error) {
        console.error(error);
        showMessage("저장 중 오류가 발생했습니다. Firebase 설정을 확인해주세요.", "error");
      } finally {
        saveBtn.disabled = false;
      }
    });

    const attendanceQuery = query(
      collection(db, "attendance"),
      orderBy("createdAt", "desc")
    );

    onSnapshot(
      attendanceQuery,
      (snapshot) => {
        const records = snapshot.docs.map((doc) => ({
          id: doc.id,
          ...doc.data(),
        }));
        renderRecords(records);
      },
      (error) => {
        console.error(error);
        recordListEl.innerHTML = `
          <div class="empty-state">
            실시간 데이터를 불러오지 못했습니다.<br />
            Firestore 보안 규칙 및 설정을 확인해주세요.
          </div>
        `;
      }
    );
  </script>
</body>
</html>
